

name: worktimesync

services:
  postgres:
    image: postgres:16-alpine
    container_name: wts-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wts

  redis:
    image: redis:7-alpine
    container_name: wts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wts

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: wts-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations
    # DATABASE_URL берётся из .env (через env_file). $$ — экранирование для compose.
    entrypoint:
      - sh
      - -c
      - 'migrate -path=/migrations -database="$$DATABASE_URL" up'
    restart: "no"
    networks:
      - wts

  api:
    image: ghcr.io/maximmalchevsky/hack-api:${IMAGE_TAG:-latest}
    container_name: wts-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wts

  worker:
    image: ghcr.io/maximmalchevsky/hack-worker:${IMAGE_TAG:-latest}
    container_name: wts-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - wts

  scheduler:
    image: ghcr.io/maximmalchevsky/hack-scheduler:${IMAGE_TAG:-latest}
    container_name: wts-scheduler
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - wts

  web:
    image: ghcr.io/maximmalchevsky/hack-web:${IMAGE_TAG:-latest}
    container_name: wts-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - wts

volumes:
  postgres_data:
  redis_data:

networks:
  wts:
    driver: bridge
