name: worktimesync

services:
  postgres:
    image: postgres:16-alpine
    container_name: wts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worktimesync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worktimesync_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-worktimesync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worktimesync} -d ${POSTGRES_DB:-worktimesync}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wts

  redis:
    image: redis:7-alpine
    container_name: wts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wts

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: wts-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-worktimesync}:${POSTGRES_PASSWORD:-worktimesync_dev_pass}@postgres:5432/${POSTGRES_DB:-worktimesync}?sslmode=disable"
      - "up"
    restart: "no"
    networks:
      - wts

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    container_name: wts-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-worktimesync}:${POSTGRES_PASSWORD:-worktimesync_dev_pass}@postgres:5432/${POSTGRES_DB:-worktimesync}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wts

  worker:
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    container_name: wts-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-worktimesync}:${POSTGRES_PASSWORD:-worktimesync_dev_pass}@postgres:5432/${POSTGRES_DB:-worktimesync}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - wts

  scheduler:
    build:
      context: .
      dockerfile: deploy/scheduler.Dockerfile
    container_name: wts-scheduler
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-worktimesync}:${POSTGRES_PASSWORD:-worktimesync_dev_pass}@postgres:5432/${POSTGRES_DB:-worktimesync}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - wts

  web:
    build:
      context: ./web
      dockerfile: ../deploy/web.Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
        PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8080}
    container_name: wts-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - wts

  caddy:
    image: caddy:2-alpine
    container_name: wts-caddy
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - wts

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  wts:
    driver: bridge
